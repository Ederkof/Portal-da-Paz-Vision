<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Universal de Harmonia - Protótipo 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b131a; }
        canvas { display: block; }
        #info-card {
            position: absolute; top: 20px; left: 20px;
            background: rgba(15, 32, 39, 0.85); color: #e0f2f1;
            padding: 20px; border-radius: 12px; font-family: sans-serif;
            border: 1px solid #00e5ff; display: none; max-width: 300px;
            box-shadow: 0 0 15px rgba(0,229,255,0.3);
        }
    </style>
</head>
<body>

    <div id="#info-card">
        <h3>Portal de Conversa</h3>
        <p><strong>@cultivador_sensivel:</strong> Conectado em tempo real via hélice biológica.</p>
        <button onclick="document.getElementById('#info-card').style.display='none'">Fechar</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Criando o Cenário (Cena, Câmera e Renderizador)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Criando um objeto para representar o nó central da rede
        const geometry = new THREE.SphereGeometry(1.5, 32, 32);
        const material = new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true });
        const node = new THREE.Mesh(geometry, material);
        scene.add(node);

        camera.position.z = 5;

        // 3. Animação (Fazer o objeto girar para simular a dinâmica)
        function animate() {
            requestAnimationFrame(animate);
            node.rotation.x += 0.005;
            node.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        // 4. Simulação do Clique (Temporário: Abre o card após 3 segundos para testar)
        setTimeout(() => {
            document.getElementById('#info-card').style.display = 'block';
        }, 3000);

        // Ajustar tamanho se a tela mudar (ex: girar o celular)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
